<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointage Hafid Pro ScreenFit</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px; /* تقليل الحواف الجانبية */
            margin: 0;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* حاوية العنوان والأزرار */
        .header-box {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 5px;
            box-sizing: border-box;
        }

        .title-silver-box {
            background: linear-gradient(145deg, #ffffff, #a0a0a0);
            padding: 6px 10px;
            border-radius: 4px;
            box-shadow: 2px 2px 5px #000;
            border: 1px solid #888;
            flex-shrink: 1; /* السماح للمربع بالصغر إذا لزم الأمر */
        }

        .title-silver-box h2 { 
            margin: 0; 
            font-size: 0.8rem; /* تصغير الخط قليلاً ليناسب الشاشة */
            color: #000; 
            text-transform: uppercase; 
            font-weight: 800;
            white-space: nowrap; /* منع النص من النزول لسطر جديد */
        }

        .btn-group { display: flex; gap: 4px; flex-shrink: 0; }

        .btn {
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .btn-plus { width: 30px; height: 30px; background: #2E5BFF; color: white; font-size: 1.1rem; }
        .btn-minus { width: 30px; height: 30px; background: rgba(255, 77, 77, 0.1); border: 1px solid #FF4D4D; color: #FF4D4D; }
        .btn-pdf { background: linear-gradient(145deg, #ffffff, #a0a0a0); color: #000; padding: 0 8px; font-size: 0.65rem; height: 30px; border: 1px solid #888; }

        /* حاوية الجدول: تجعل العرض 100% */
        .table-container { 
            width: 100%; 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 0 2px;
            box-sizing: border-box;
        }

        .labels {
            display: grid;
            grid-template-columns: 1.1fr 1fr 0.9fr 0.9fr; /* توزيع الأطقم لتناسب العرض */
            text-align: center;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
            margin-bottom: 8px;
        }

        .label { font-size: 0.6rem; color: #8e949e; font-weight: bold; }

        .data-row {
            display: grid;
            grid-template-columns: 1.1fr 1fr 0.9fr 0.9fr; /* نفس توزيع العناوين */
            gap: 3px;
            margin-bottom: 5px;
        }

        input {
            background: linear-gradient(145deg, #1e2127, #16191e);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 1px;
            font-size: 0.75rem; /* تصغير الخط ليناسب الخانات الضيقة */
            text-align: center;
            outline: none;
            border-radius: 4px;
            width: 100%; /* جعل الإدخال يأخذ كامل عرض الخانة */
            box-sizing: border-box;
        }

        .footer { font-size: 0.55rem; color: #444; margin: 5px 0; text-align: right; width: 100%; letter-spacing: 2px; }

        @media print {
            .btn-group { display: none; }
            body { background: white; color: black; padding: 0; }
            input { border: 1px solid #000; background: white; color: black; }
            .title-silver-box { background: white; border: 1px solid #000; }
        }
    </style>
</head>
<body>

    <div class="header-box">
        <div class="title-silver-box">
            <h2>POINTAGE HAFID.S</h2>
        </div>
        <div class="btn-group">
            <button class="btn btn-plus" onclick="addRow()">+</button>
            <button class="btn btn-minus" onclick="removeRow()">-</button>
            <button class="btn btn-pdf" onclick="window.print()">PDF</button>
        </div>
    </div>

    <div class="table-container">
        <div class="labels">
            <div class="label">DATE</div>
            <div class="label">STATUS</div>
            <div class="label">IN</div>
            <div class="label">OUT</div>
        </div>
        <div id="tableBody"></div>
    </div>

    <div class="footer">HAFID SAJIDI</div>

    <script>
        function addRow(data = ["", "", "", ""]) {
            const container = document.getElementById('tableBody');
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `
                <input type="text" placeholder="jj/mm" value="${data[0]}" oninput="save()">
                <input type="text" placeholder="..." value="${data[1]}" oninput="save()">
                <input type="text" placeholder="00:00" value="${data[2]}" oninput="save()">
                <input type="text" placeholder="00:00" value="${data[3]}" oninput="save()">
            `;
            container.appendChild(row);
        }

        function removeRow() {
            const container = document.getElementById('tableBody');
            if (container.lastElementChild) {
                container.removeChild(container.lastElementChild);
                save();
            }
        }

        function save() {
            const rows = Array.from(document.querySelectorAll('.data-row')).map(r => 
                Array.from(r.querySelectorAll('input')).map(i => i.value)
            );
            localStorage.setItem('hafid_pro_fit_data', JSON.stringify(rows));
        }

        const saved = localStorage.getItem('hafid_pro_fit_data');
        if (saved) {
            JSON.parse(saved).forEach(r => addRow(r));
        } else {
            for(let i=0; i<8; i++) addRow();
        }
    </script>
</body>
</html>
