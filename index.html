<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointage Hafid Pro V3</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        .header-box {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        /* المربع الفضي الاحترافي للعنوان */
        .title-silver-box {
            background: linear-gradient(145deg, #ffffff, #a0a0a0); /* تدرج فضي معدني */
            padding: 8px 15px;
            border-radius: 4px; /* زوايا مربعة حادة */
            box-shadow: 2px 2px 5px #050505, inset 1px 1px 2px rgba(255,255,255,0.8);
            border: 1px solid #888;
        }

        .title-silver-box h2 { 
            margin: 0; 
            font-size: 0.9rem; 
            color: #000; /* لون الكتابة أسود ليتناقض مع الفضي */
            text-transform: uppercase; 
            font-weight: 800;
            letter-spacing: 1px;
        }

        .btn-group { display: flex; gap: 6px; }

        .btn {
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .btn-plus { width: 32px; height: 32px; background: #2E5BFF; color: white; font-size: 1.3rem; }
        .btn-minus { width: 32px; height: 32px; background: rgba(255, 77, 77, 0.1); border: 1px solid #FF4D4D; color: #FF4D4D; }
        
        /* زر PDF فضي أيضاً */
        .btn-pdf { 
            background: linear-gradient(145deg, #ffffff, #a0a0a0); 
            color: #000; 
            padding: 0 12px; 
            font-size: 0.7rem; 
            height: 32px;
            text-transform: uppercase;
            box-shadow: 2px 2px 5px #050505;
            border: 1px solid #888;
        }

        .table-container { width: 100%; max-width: 400px; flex-grow: 1; overflow-y: auto; padding: 0 5px; }

        .labels {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1fr;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
            margin-bottom: 8px;
        }

        .label { font-size: 0.65rem; color: #8e949e; font-weight: bold; text-transform: uppercase; }

        .data-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1fr;
            gap: 5px;
            margin-bottom: 6px;
        }

        input {
            background: linear-gradient(145deg, #1e2127, #16191e);
            border: 1px solid #333;
            color: #fff;
            padding: 12px 2px;
            font-size: 0.8rem;
            text-align: center;
            outline: none;
            border-radius: 4px;
            box-shadow: inset 2px 2px 5px #0a0c10;
        }

        input:focus { border-color: #ffffff; }

        .footer { font-size: 0.6rem; color: #444; margin-top: 10px; letter-spacing: 3px; text-align: right; width: 100%; max-width: 400px; }

        @media print {
            .btn-group { display: none; }
            body { background: white; color: black; padding: 0; }
            input { border: 1px solid #000; background: white; color: black; box-shadow: none; }
            .header-box { border: none; background: white; color: black; box-shadow: none; }
            .title-silver-box { background: white; border: 1px solid #000; box-shadow: none; }
            .title-silver-box h2 { color: black; }
        }
    </style>
</head>
<body>

    <div class="header-box">
        <div class="title-silver-box">
            <h2>POINTAGE HAFID.S</h2>
        </div>
        <div class="btn-group">
            <button class="btn btn-plus" onclick="addRow()">+</button>
            <button class="btn btn-minus" onclick="removeRow()">-</button>
            <button class="btn btn-pdf" onclick="window.print()">PDF</button>
        </div>
    </div>

    <div class="table-container">
        <div class="labels">
            <div class="label">DATE</div>
            <div class="label">STATUS</div>
            <div class="label">IN</div>
            <div class="label">OUT</div>
        </div>
        <div id="tableBody"></div>
    </div>

    <div class="footer">HAFID SAJIDI</div>

    <script>
        // دالة إضافة سطر جديد
        function addRow(data = ["", "", "", ""]) {
            const container = document.getElementById('tableBody');
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `
                <input type="text" placeholder="jj/mm" value="${data[0]}" oninput="save()">
                <input type="text" placeholder="..." value="${data[1]}" oninput="save()">
                <input type="text" placeholder="00:00" value="${data[2]}" oninput="save()">
                <input type="text" placeholder="00:00" value="${data[3]}" oninput="save()">
            `;
            container.appendChild(row);
        }

        // دالة مسح آخر سطر
        function removeRow() {
            const container = document.getElementById('tableBody');
            if (container.lastElementChild) {
                container.removeChild(container.lastElementChild);
                save();
            }
        }

        // دالة حفظ البيانات في ذاكرة الهاتف
        function save() {
            const rows = Array.from(document.querySelectorAll('.data-row')).map(r => 
                Array.from(r.querySelectorAll('input')).map(i => i.value)
            );
            localStorage.setItem('hafid_pro_v3_data', JSON.stringify(rows));
        }

        // تحميل البيانات عند فتح التطبيق
        const saved = localStorage.getItem('hafid_pro_v3_data');
        if (saved) {
            JSON.parse(saved).forEach(r => addRow(r));
        } else {
            // إضافة 8 أسطر افتراضية
            for(let i=0; i<8; i++) addRow();
        }
    </script>
</body>
</html>
